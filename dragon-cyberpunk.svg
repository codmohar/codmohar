<svg viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05030a"/>
      <stop offset="45%" stop-color="#0a0820"/>
      <stop offset="100%" stop-color="#090b1f"/>
    </linearGradient>
    <linearGradient id="dragonGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="50%" stop-color="#00ffa3"/>
      <stop offset="100%" stop-color="#70ffea"/>
    </linearGradient>
    <linearGradient id="flameGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff00c8"/>
      <stop offset="40%" stop-color="#ff4d6d"/>
      <stop offset="75%" stop-color="#ff8a00"/>
      <stop offset="100%" stop-color="#ffe66d"/>
    </linearGradient>
    <filter id="neonGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="9" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="320" fill="url(#bgGrad)"/>

  <!-- scanlines -->
  <g opacity="0.08">
    <rect x="0" y="20" width="1280" height="1" fill="#ffffff"/>
    <rect x="0" y="60" width="1280" height="1" fill="#ffffff"/>
    <rect x="0" y="100" width="1280" height="1" fill="#ffffff"/>
    <rect x="0" y="140" width="1280" height="1" fill="#ffffff"/>
    <rect x="0" y="180" width="1280" height="1" fill="#ffffff"/>
    <rect x="0" y="220" width="1280" height="1" fill="#ffffff"/>
    <rect x="0" y="260" width="1280" height="1" fill="#ffffff"/>
    <rect x="0" y="300" width="1280" height="1" fill="#ffffff"/>
  </g>

  <!-- stars -->
  <g fill="#c4b5fd" filter="url(#neonGlow)">
    <circle cx="960" cy="55" r="2.1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="1020" cy="95" r="2"><animate attributeName="opacity" values="1;0.3;1" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="1110" cy="68" r="2"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="1170" cy="118" r="1.8"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="1035" cy="152" r="1.8"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/></circle>
  </g>

  <!-- dragon body -->
  <path filter="url(#neonGlow)"
        d="M170 215 C210 105, 445 82, 558 168 C595 195, 640 198, 676 171
           C668 204, 633 232, 590 238 C549 244, 525 260, 498 280
           C484 250, 485 224, 455 209 C392 177, 282 242, 170 215 Z"
        fill="none" stroke="url(#dragonGrad)" stroke-width="6" stroke-linejoin="round"/>

  <!-- dragon head -->
  <path filter="url(#neonGlow)"
        d="M670 157 C712 126, 790 125, 848 154 C815 156, 795 173, 764 186
           C732 198, 699 192, 670 157 Z"
        fill="none" stroke="url(#dragonGrad)" stroke-width="6"/>

  <!-- horn -->
  <path filter="url(#neonGlow)" d="M752 132 L770 105 L780 136" fill="none" stroke="#67e8f9" stroke-width="4"/>

  <!-- eye -->
  <circle cx="767" cy="157" r="4" fill="#fef08a" filter="url(#neonGlow)"/>

  <!-- cyber flame -->
  <path filter="url(#neonGlow)"
        d="M850 164 C922 126, 1000 137, 1085 152 C1145 162, 1198 154, 1258 135
           C1226 173, 1185 193, 1118 201 C1043 210, 944 197, 850 174 Z"
        fill="none" stroke="url(#flameGrad)" stroke-width="8" stroke-linecap="round">
    <animate attributeName="d"
      values="
      M850 164 C922 126, 1000 137, 1085 152 C1145 162, 1198 154, 1258 135 C1226 173, 1185 193, 1118 201 C1043 210, 944 197, 850 174 Z;
      M850 166 C915 121, 1008 143, 1090 156 C1148 166, 1200 149, 1262 132 C1229 178, 1182 197, 1120 206 C1040 216, 939 199, 850 176 Z;
      M850 164 C922 126, 1000 137, 1085 152 C1145 162, 1198 154, 1258 135 C1226 173, 1185 193, 1118 201 C1043 210, 944 197, 850 174 Z"
      dur="1s" repeatCount="indefinite"/>
  </path>

  <!-- title -->
  <text x="56" y="74" fill="#e9d5ff" font-size="36" font-family="Segoe UI, Arial, sans-serif" font-weight="700" filter="url(#neonGlow)">
    Tech Playground // AI/ML Side Quests
  </text>
  <text x="58" y="109" fill="#7dd3fc" font-size="18" font-family="Consolas, monospace">
    building fun stuff • training ideas • breathing neon fire
  </text>
  <text x="58" y="140" fill="#f0abfc" font-size="14" font-family="Consolas, monospace" opacity="0.95">
    [status: online] [mode: cyberpunk] [focus: build + research]
  </text>
</svg>
